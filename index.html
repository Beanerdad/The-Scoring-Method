/* Standalone build: always store on-device via localStorage; never use a host page's storage. */
(function(){
  var P = "smt_kv_";
  window.storage = {
    get: function(k){ try { var v = localStorage.getItem(P+k); return Promise.resolve(v==null?null:{key:k,value:v}); } catch(e){ return Promise.resolve(null);} },
    set: function(k,v){ try { localStorage.setItem(P+k, v); } catch(e){} return Promise.resolve({key:k,value:v}); },
    delete: function(k){ try { localStorage.removeItem(P+k); } catch(e){} return Promise.resolve({key:k,deleted:true}); },
    list: function(pre){ var keys=[]; try { for (var i=0;i<localStorage.length;i++){ var kk=localStorage.key(i); if(kk&&kk.indexOf(P)===0){ var bare=kk.slice(P.length); if(!pre||bare.indexOf(pre)===0) keys.push(bare); } } } catch(e){} return Promise.resolve({keys:keys}); }
  };
  window.__SMT_SCAN_DISABLED__ = true;
  /* Show the branded splash only on a genuinely first-ever launch. Any saved round or
     profile means this is a returning user, so skip the splash regardless of flags. */
  try {
    var rawProf = localStorage.getItem(P + "sm-golf-profile-v1");
    var rawRounds = localStorage.getItem(P + "sm-golf-rounds-v1");
    var prof = null; try { prof = rawProf ? JSON.parse(rawProf) : null; } catch(e){}
    var hasRounds = false; try { var rr = rawRounds ? JSON.parse(rawRounds) : []; hasRounds = Array.isArray(rr) && rr.length > 0; } catch(e){}
    window.__SMT_ONBOARDED__ = !!(hasRounds || rawProf || (prof && prof.onboarded));
  } catch(e){ window.__SMT_ONBOARDED__ = false; }
})();
